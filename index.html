<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧑‍🎓 Sistem Cek Kelulusan </title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(circle at 25% 25%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(255, 119, 198, 0.2) 0%, transparent 50%);
    z-index: -1;
    animation: bgPulse 8s ease-in-out infinite alternate;
}

@keyframes bgPulse {
    0% { opacity: 0.8; }
    100% { opacity: 1; }
}

/* MAIN APP CONTAINER */
.app-container {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 45px 35px;
    width: 100%;
    max-width: 420px;
    box-shadow: 
        0 32px 64px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.2);
    position: relative;
    animation: appSlideIn 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

@keyframes appSlideIn {
    from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* HEADER */
.app-header {
    text-align: center;
    margin-bottom: 35px;
}

.app-title {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

.app-subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    font-weight: 400;
}

/* FORM */
.form-group {
    margin-bottom: 25px;
    position: relative;
}

.form-label {
    display: block;
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-input {
    width: 100%;
    padding: 18px 22px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    backdrop-filter: blur(10px);
}

.form-input::placeholder {
    color: rgba(255,255,255,0.4);
}

.form-input:focus {
    outline: none;
    border-color: #a8edea;
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 0 4px rgba(168, 237, 234, 0.2);
    transform: translateY(-2px);
}

/* BUTTON */
.submit-btn {
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
}

.submit-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(102, 126, 234, 0.5);
}

.submit-btn:active {
    transform: translateY(-2px);
}

.btn-ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: scale(0);
    animation: ripple 0.6s linear;
}

@keyframes ripple {
    to {
        transform: scale(4);
        opacity: 0;
    }
}

/* RESULT */
.result-container {
    margin-top: 30px;
    padding: 25px;
    border-radius: 20px;
    transform: scale(0);
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.result-container.show {
    transform: scale(1);
    opacity: 1;
}

.result-success {
    background: linear-gradient(135deg, rgba(46, 204, 113, 0.2) 0%, rgba(39, 174, 96, 0.15) 100%);
    border: 2px solid rgba(46, 204, 113, 0.4);
}

.result-fail {
    background: linear-gradient(135deg, rgba(231, 76, 60, 0.2) 0%, rgba(192, 57, 43, 0.15) 100%);
    border: 2px solid rgba(231, 76, 60, 0.4);
}

.result-excellent {
    background: linear-gradient(135deg, rgba(52, 152, 219, 0.25) 0%, rgba(41, 128, 185, 0.2) 100%);
    border: 2px solid rgba(52, 152, 219, 0.5);
}

.result-header {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
}

.result-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 20px;
    font-size: 15px;
}

.detail-item {
    text-align: center;
    padding: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
}

.detail-label {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    margin-bottom: 4px;
}

.detail-value {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
}

.result-status {
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    margin: 15px 0;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.result-message {
    text-align: center;
    font-size: 15px;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
}

/* LOADING */
.loading-spinner {
    display: none;
    width: 28px;
    height: 28px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top: 3px solid #a8edea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
}

.loading-spinner.active {
    display: block;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .app-container {
        padding: 35px 25px;
        margin: 10px;
    }
    
    .app-title {
        font-size: 26px;
    }
    
    .result-details {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
    <div class="app-container" id="appContainer">
        <header class="app-header">
            <h1 class="app-title">🎓 Kelulusan Siswa</h1>
            <p class="app-subtitle">pengecekan kelulusan</p>
        </header>

        <form id="studentForm" class="student-form">
            <div class="form-group">
                <label class="form-label" for="nama">Nama Siswa</label>
                <input 
                    type="text" 
                    id="nama" 
                    class="form-input" 
                    placeholder="Masukkan nama lengkap siswa"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="nilai">Nilai Akhir (0-100)</label>
                <input 
                    type="number" 
                    id="nilai" 
                    class="form-input" 
                    placeholder="0 - 100"
                    min="0" 
                    max="100"
                    required
                >
            </div>

            <div class="loading-spinner" id="loadingSpinner"></div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                🚀 Cek Kelulusan
            </button>
        </form>

        <div class="result-container" id="resultContainer"></div>
    </div>

    <script>
        class KelulusanChecker {
            constructor() {
                this.form = document.getElementById('studentForm');
                this.resultContainer = document.getElementById('resultContainer');
                this.loadingSpinner = document.getElementById('loadingSpinner');
                this.submitBtn = document.getElementById('submitBtn');
                this.namaInput = document.getElementById('nama');
                this.nilaiInput = document.getElementById('nilai');
                
                this.init();
            }

            init() {
                // Event listeners
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                this.namaInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.nilaiInput.focus();
                });
                this.nilaiInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleSubmit(e);
                });

                // Auto-focus
                this.namaInput.focus();
            }

            async handleSubmit(e) {
                e.preventDefault();
                
                const nama = this.namaInput.value.trim();
                const nilai = parseInt(this.nilaiInput.value);

                // Validasi
                if (!this.validateInput(nama, nilai)) {
                    this.showError('Mohon masukkan data yang valid (nama & nilai 0-100)');
                    return;
                }

                // Show loading
                this.setLoading(true);

                // Simulate API delay
                await this.delay(1500);

                // Process result
                const result = this.processKelulusan(nama, nilai);
                this.showResult(result);

                // Reset loading
                this.setLoading(false);
            }

            validateInput(nama, nilai) {
                return nama.length > 0 && 
                       !isNaN(nilai) && 
                       nilai >= 0 && 
                       nilai <= 100;
            }

            processKelulusan(nama, nilai) {
                let status, statusClass, emoji, message, color;

                if (nilai >= 90) {
                    status = '🏆 LULUS GEMILANG';
                    statusClass = 'excellent';
                    emoji = '🎉✨';
                    message = 'Prestasi luar biasa! Selamat ya!';
                    color = '#3498db';
                } else if (nilai >= 75) {
                    status = '✅ LULUS';
                    statusClass = 'success';
                    emoji = '🎊🎓';
                    message = 'Selamat! Kamu berhasil lulus!';
                    color = '#2ecc71';
                } else {
                    status = '❌ TIDAK LULUS';
                    statusClass = 'fail';
                    emoji = '😔📚';
                    message = 'Belajar lebih giat lagi tahun depan!';
                    color = '#e74c3c';
                }

                return {
                    nama,
                    nilai,
                    status,
                    statusClass,
                    emoji,
                    message,
                    color
                };
            }

            showResult(result) {
                this.resultContainer.className = `result-container ${result.statusClass} show`;
                this.resultContainer.innerHTML = `
                    <div class="result-header">${result.emoji}</div>
                    <div class="result-details">
                        <div class="detail-item">
                            <div class="detail-label">Nama</div>
                            <div class="detail-value">${result.nama}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Nilai</div>
                            <div class="detail-value">${result.nilai}</div>
                        </div>
                    </div>
                    <div class="result-status" style="color: ${result.color}">${result.status}</div>
                    <div class="result-message">${result.message}</div>
                `;

                // Ripple effect on button
                this.createRipple();
            }

            showError(message) {
                this.resultContainer.className = 'result-container fail show';
                this.resultContainer.innerHTML = `
                    <div class="result-header">⚠️</div>
                    <div class="result-status">Data Tidak Valid</div>
                    <div class="result-message">${message}</div>
                `;
            }

            setLoading(loading) {
                this.loadingSpinner.classList.toggle('active', loading);
                this.submitBtn.disabled = loading;
                this.submitBtn.textContent = loading ? '⏳ Memproses...' : '🚀 Cek Kelulusan';
            }

            createRipple() {
                const ripple = document.createElement('span');
                ripple.classList.add('btn-ripple');
                ripple.style.left = '50%';
                ripple.style.top = '50%';
                this.submitBtn.appendChild(ripple);

                setTimeout(() => {
                    ripple.remove();
                }, 600);
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // Initialize app when DOM loaded
        document.addEventListener('DOMContentLoaded', () => {
            new KelulusanChecker();
        });
    </script>
</body>
</html>
